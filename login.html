<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Login — Classic Chic</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/animations.css"><link rel="stylesheet" href="css/responsive.css">
</head><body>
<div id="cc-navbar"></div><div id="cc-sidebar"></div>
<main class="container auth-wrap">
  <form class="auth-card anim-scaleIn" id="login-form" autocomplete="on">
    <div class="logo">C</div>
    <h1>Welcome back</h1>
    <p class="sub">Sign in to continue to Classic Chic</p>
    <div class="field"><label>Email</label><input type="email" name="email" required/></div>
    <div class="field pwd"><label>Password</label><input type="password" name="password" required minlength="6" id="pw"/><span class="toggle" onclick="var i=document.getElementById('pw'); i.type=i.type==='password'?'text':'password'; this.textContent=i.type==='password'?'Show':'Hide';">Show</span></div>
    <div class="field-row">
      <label><input type="checkbox" name="remember"/> Remember me</label>
      <a href="forgot-password.html">Forgot password?</a>
    </div>
    <div class="err" id="err"></div>
    <button class="btn btn-primary btn-block btn-lg" type="submit">Sign In</button>
    <div class="auth-swap">New to Classic Chic? <a href="signup.html">Create an account</a></div>
  </form>
</main>
<div id="cc-footer"></div><div id="cc-bottom"></div>
<script src="js/products.js"></script><script src="js/cart.js"></script><script src="js/auth.js"></script>
<script src="js/animations.js"></script><script src="js/script.js"></script>
<script>
document.getElementById('login-form').addEventListener('submit', e=>{
  e.preventDefault();
  const fd = new FormData(e.target);
  const res = Auth.login({ email:fd.get('email').trim(), password:fd.get('password'), remember:!!fd.get('remember') });
  const err = document.getElementById('err');
  if(!res.ok){ err.textContent=res.error; err.classList.add('show'); return; }
  toast('Welcome back');
  const next = new URL(location.href).searchParams.get('next') || 'profile.html';
  setTimeout(()=>location.href=next, 500);
});
</script>
</body></html>
