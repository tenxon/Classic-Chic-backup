<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Search — Classic Chic</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/animations.css"><link rel="stylesheet" href="css/responsive.css">
</head><body>
<div id="cc-navbar"></div><div id="cc-sidebar"></div>
<main class="container">
  <section class="search-panel">
    <div class="breadcrumb"><a href="index.html">Home</a><span>/</span>Search</div>
    <div class="search-box">
      <input id="q" placeholder="Search kurtas, sarees, sherwanis…" autofocus />
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5" stroke-linecap="round"/></svg>
    </div>
    <div class="suggestions" id="sugg"></div>
    <div class="filter-bar" style="max-width:720px;margin:0 auto 24px">
      <div class="chips" id="chips"></div>
    </div>
    <div class="product-grid" id="grid"></div>
  </section>
</main>
<div id="cc-footer"></div><div id="cc-bottom"></div>
<script src="js/products.js"></script><script src="js/cart.js"></script><script src="js/auth.js"></script>
<script src="js/search.js"></script><script src="js/animations.js"></script><script src="js/script.js"></script>
<script>
document.addEventListener('DOMContentLoaded', ()=>{
  const url = new URL(location.href);
  const q0 = url.searchParams.get('q') || '';
  const input = document.getElementById('q');
  input.value = q0;
  attachSearch(input, document.getElementById('sugg'));
  const subs = ['All','Men','Women', ...Array.from(new Set(CC_PRODUCTS.map(p=>p.sub)))];
  let active='All';
  const chips = document.getElementById('chips');
  chips.innerHTML = subs.map(s=>`<button class="chip ${s===active?'active':''}" data-s="${s}">${s}</button>`).join('');
  chips.addEventListener('click', e=>{ const b=e.target.closest('.chip'); if(!b)return; active=b.dataset.s; chips.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active', c===b)); render(); });
  input.addEventListener('input', render);
  function render(){
    let opts={ search:input.value.trim() };
    if(active==='Men') opts.category='men';
    else if(active==='Women') opts.category='women';
    else if(active!=='All') opts.sub=active;
    const list = filterProducts(opts);
    document.getElementById('grid').innerHTML = list.map(renderProductCard).join('') || '<div class="empty-state"><h3>No matches</h3><p>Try a different keyword.</p></div>';
  }
  render();
});
</script>
</body></html>
