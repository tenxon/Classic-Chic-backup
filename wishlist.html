<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Wishlist — Classic Chic</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/animations.css"><link rel="stylesheet" href="css/responsive.css">
</head><body>
<div id="cc-navbar"></div><div id="cc-sidebar"></div>
<main class="container">
  <header class="page-hero">
    <div class="breadcrumb"><a href="index.html">Home</a><span>/</span>Wishlist</div>
    <span class="eyebrow">Saved for later</span>
    <h1>Your Wishlist</h1>
  </header>
  <div class="product-grid" id="grid"></div>
</main>
<div id="cc-footer"></div><div id="cc-bottom"></div>
<script src="js/products.js"></script><script src="js/cart.js"></script><script src="js/auth.js"></script>
<script src="js/animations.js"></script><script src="js/script.js"></script>
<script>
function draw(){
  const ids = Wishlist.all();
  const list = ids.map(id=>getProduct(id)).filter(Boolean);
  document.getElementById('grid').innerHTML = list.length
    ? list.map(renderProductCard).join('')
    : '<div class="empty-state"><h3>Your wishlist is empty</h3><p>Discover pieces you love.</p><a class="btn btn-primary" href="categories.html">Start Shopping</a></div>';
}
document.addEventListener('DOMContentLoaded', draw);
window.addEventListener('cc:update', draw);
</script>
</body></html>
