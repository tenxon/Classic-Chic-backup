<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>My Profile — Classic Chic</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/animations.css"><link rel="stylesheet" href="css/responsive.css">
</head><body>
<div id="cc-navbar"></div><div id="cc-sidebar"></div>
<main class="container">
  <div id="profile-body"></div>
</main>
<div id="cc-footer"></div><div id="cc-bottom"></div>
<script src="js/products.js"></script><script src="js/cart.js"></script><script src="js/auth.js"></script>
<script src="js/profile.js"></script><script src="js/animations.js"></script><script src="js/script.js"></script>
<script>
document.addEventListener('DOMContentLoaded', ()=>{
  if(!requireLogin()) return;
  const u = Auth.current();
  const orders = JSON.parse(localStorage.getItem('cc_orders')||'[]');
  const wish = Wishlist.all().length;
  document.getElementById('profile-body').innerHTML = `
    <div class="page-hero" style="text-align:left;padding-bottom:0"><div class="breadcrumb"><a href="index.html">Home</a><span>/</span>Profile</div></div>
    <div class="profile-wrap">
      <aside class="profile-side">
        <div class="avatar">${u.name[0].toUpperCase()}</div>
        <div class="name">${u.name}</div>
        <div class="email">${u.email}</div>
        <ul class="profile-menu">
          <li><a class="active" href="profile.html">Overview</a></li>
          <li><a href="orders.html">My Orders</a></li>
          <li><a href="wishlist.html">Wishlist</a></li>
          <li><a href="#addresses">Addresses</a></li>
          <li><a href="#" id="lo">Logout</a></li>
        </ul>
      </aside>
      <section class="profile-main">
        <h2>Welcome, ${u.name.split(' ')[0]}</h2>
        <p style="color:var(--muted);margin-bottom:24px">Manage your account, orders and saved pieces.</p>
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:30px">
          <a href="orders.html" class="hover-lift" style="display:block;background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:20px">
            <div style="font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)">Orders</div>
            <div style="font-family:var(--font-serif);font-size:2rem">${orders.length}</div>
          </a>
          <a href="wishlist.html" class="hover-lift" style="display:block;background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:20px">
            <div style="font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)">Wishlist</div>
            <div style="font-family:var(--font-serif);font-size:2rem">${wish}</div>
          </a>
          <a href="cart.html" class="hover-lift" style="display:block;background:var(--bg);border:1px solid var(--border);border-radius:14px;padding:20px">
            <div style="font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted)">Cart</div>
            <div style="font-family:var(--font-serif);font-size:2rem">${Cart.count()}</div>
          </a>
        </div>
        <h3 id="addresses" style="font-family:var(--font-sans);font-size:14px;letter-spacing:2px;text-transform:uppercase;color:var(--accent);margin-bottom:14px">Saved Addresses</h3>
        <div id="addr" style="color:var(--muted)">No saved addresses yet — your shipping details will appear here after your first order.</div>
      </section>
    </div>`;
  document.getElementById('lo').addEventListener('click', e=>{ e.preventDefault(); Auth.logout(); toast('Logged out'); setTimeout(()=>location.href='index.html', 500); });
});
</script>
</body></html>
