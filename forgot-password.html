<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Forgot Password — Classic Chic</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/animations.css"><link rel="stylesheet" href="css/responsive.css">
</head><body>
<div id="cc-navbar"></div><div id="cc-sidebar"></div>
<main class="container auth-wrap">
  <form class="auth-card anim-scaleIn" id="fp-form">
    <div class="logo">C</div>
    <h1>Reset your password</h1>
    <p class="sub">We'll send you a reset link</p>
    <div class="field"><label>Email</label><input required type="email" name="email"/></div>
    <div class="err" id="err"></div>
    <button class="btn btn-primary btn-block btn-lg" type="submit">Send Reset Link</button>
    <div class="auth-swap">Remembered? <a href="login.html">Sign in</a></div>
  </form>
</main>
<div id="cc-footer"></div><div id="cc-bottom"></div>
<script src="js/products.js"></script><script src="js/cart.js"></script><script src="js/auth.js"></script>
<script src="js/animations.js"></script><script src="js/script.js"></script>
<script>
document.getElementById('fp-form').addEventListener('submit', e=>{
  e.preventDefault();
  const email = new FormData(e.target).get('email').trim();
  const res = Auth.reset({ email });
  const err = document.getElementById('err');
  if(!res.ok){ err.textContent=res.error; err.classList.add('show'); return; }
  toast('Reset link sent to your email');
  setTimeout(()=>location.href='login.html', 900);
});
</script>
</body></html>
