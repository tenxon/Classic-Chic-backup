<!doctype html>
<html lang="en"><head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Women — Classic Chic</title>
<meta name="description" content="Women's ethnic wear — sarees, anarkalis, lehengas, kurtas and sharara sets by Classic Chic."/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css"><link rel="stylesheet" href="css/animations.css"><link rel="stylesheet" href="css/responsive.css">
</head><body>
<div id="cc-navbar"></div><div id="cc-sidebar"></div>
<main class="container">
  <header class="page-hero">
    <div class="breadcrumb"><a href="index.html">Home</a><span>/</span>Women</div>
    <span class="eyebrow">Womenswear Atelier</span>
    <h1>The Women's Collection</h1>
    <p>Sarees, anarkalis, lehengas — heritage weaves and modern silhouettes, worn with confidence.</p>
  </header>
  <div class="filter-bar">
    <div class="chips" id="chips"></div>
    <select id="sort">
      <option value="">Sort by</option>
      <option value="price-asc">Price: Low to High</option>
      <option value="price-desc">Price: High to Low</option>
      <option value="rating">Top Rated</option>
    </select>
  </div>
  <div class="product-grid" id="grid"></div>
</main>
<div id="cc-footer"></div><div id="cc-bottom"></div>
<script src="js/products.js"></script><script src="js/cart.js"></script><script src="js/auth.js"></script>
<script src="js/animations.js"></script><script src="js/script.js"></script>
<script>
document.addEventListener('DOMContentLoaded', ()=>{
  const subs = ['All', ...Array.from(new Set(CC_PRODUCTS.filter(p=>p.category==='women').map(p=>p.sub)))];
  const chips = document.getElementById('chips');
  let activeSub='All', sort='';
  chips.innerHTML = subs.map(s=>`<button class="chip ${s===activeSub?'active':''}" data-s="${s}">${s}</button>`).join('');
  chips.addEventListener('click', e=>{ const b=e.target.closest('.chip'); if(!b)return; activeSub=b.dataset.s; chips.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active', c===b)); render(); });
  document.getElementById('sort').addEventListener('change', e=>{ sort=e.target.value; render(); });
  function render(){
    const list = filterProducts({ category:'women', sub: activeSub==='All'?null:activeSub, sort });
    document.getElementById('grid').innerHTML = list.map(renderProductCard).join('') || '<div class="empty-state"><h3>Nothing here yet</h3></div>';
  }
  render();
});
</script>
</body></html>
